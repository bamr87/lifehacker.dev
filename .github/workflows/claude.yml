name: Claude

# @claude mention handler, seeded from bamr87/bamr87 templates/agent-context/.
# Mention @claude in an issue or PR comment and Claude Code picks up the task.
#
# Auth (house convention): CLAUDE_CODE_OAUTH_TOKEN (from `claude setup-token`)
# preferred; ANTHROPIC_API_KEY used only when the OAuth token is absent.
# See bamr87/bamr87 docs/AI-INTEGRATION.md.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

permissions:
  contents: read

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🤖 claude
        id: agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN == '' && secrets.ANTHROPIC_API_KEY || '' }}

      # lh-ai-usage metering — MANUAL ADDITION to this seeded file. If the
      # template regenerates it, RE-ADD these two steps: the devops audit
      # (scripts/devops/audit.rb) fails loudly when a workflow uses
      # claude-code-action without usage_report, so the drift cannot go unseen.
      - name: 📊 meter AI usage
        id: usage
        if: ${{ always() }}
        run: |-
          f="${{ steps.agent.outputs.execution_file }}"
          if [ -n "$f" ] && [ -f "$f" ]; then
            ruby scripts/ai/usage.rb ingest-execution-log "$f" --agent claude-mention || true
          else
            echo "no execution log to meter"
          fi
          ruby scripts/ai/usage_report.rb || echo "::notice::AI usage report failed (non-fatal)."
      - name: 📊 upload AI usage artifact
        if: ${{ always() && steps.usage.outputs.file != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.usage.outputs.name }}
          path: ${{ steps.usage.outputs.file }}
          if-no-files-found: ignore
          retention-days: 30
