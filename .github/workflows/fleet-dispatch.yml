# =============================================================================
# fleet-dispatch.yml — the orchestration controller (manual, gated, OFF by default)
# -----------------------------------------------------------------------------
# Runs scripts/fleet/dispatch.rb: observe the queue + backlog + open-PR count,
# decide the grow/fix split, lease work, and (when enabled) spawn role agents.
# The dispatcher opens ZERO PRs itself; the leased agents each open one a human
# merges.
#
# THREE THINGS KEEP THIS SAFE:
#   1. workflow_dispatch only — no schedule. The fleet never runs unattended
#      until someone turns the cron on (and notes it in /about/colophon/).
#   2. FLEET_ENABLED kill switch — a repo VARIABLE, not a file, so it takes
#      effect instantly with no merge. dispatch.rb idles unless it is "true".
#      The bot token has NO `administration` scope, so a compromised agent
#      cannot set this variable to re-enable itself.
#   3. concurrency:group=fleet-dispatch — only one dispatcher is ever live, so
#      leases never race.
#
# The agent-spawn job IS wired (below): with `--apply` and FLEET_ENABLED=true the
# dispatcher leases work and the `spawn` job runs one role agent per planned item
# (each opens ONE PR a human merges). It stays MANUAL — to go fully unattended,
# uncomment the schedule below and add a dated line to the colophon.
# =============================================================================
name: fleet-dispatch

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Lease work + spawn agents (unchecked = plan-only, no mutations)"
        type: boolean
        default: false
  # schedule:                      # DISABLED — autonomy is opt-in (see header).
  #   - cron: '0 8 * * *'

permissions:
  contents: write
  issues: write
  pull-requests: write
  # Deliberately NO `administration` and NO `actions`/workflows scope: the fleet
  # must not be able to edit branch protection, the gates, or this kill switch.

concurrency:
  group: fleet-dispatch
  cancel-in-progress: false

jobs:
  # ---- OBSERVE -> DECIDE -> LEASE, and emit the spawn plan as `plan` output ----
  dispatch:
    runs-on: ubuntu-latest
    outputs:
      plan: ${{ steps.dispatch.outputs.plan }}
    env:
      FLEET_ENABLED: ${{ vars.FLEET_ENABLED }}   # the kill switch; unset/empty = idle
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Dispatch
        id: dispatch
        run: |
          if [ "${{ inputs.apply }}" = "true" ]; then
            ruby scripts/fleet/dispatch.rb --apply | tee dispatch.out
          else
            ruby scripts/fleet/dispatch.rb | tee dispatch.out
          fi

      - name: Upload dispatch plan + fleet state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fleet-dispatch
          path: |
            dispatch.out
            _data/fleet/

  # ---- SPAWN: one leased role agent per planned item, each opens ONE PR --------
  # Only runs on --apply and when the dispatcher emitted a non-empty plan (so the
  # FLEET_ENABLED kill switch gates it transitively — an idle dispatcher emits no
  # plan). max-parallel:1 so the agents' dedup/leases can't race. The agents open
  # PRs (never merge); a human reviews. Same universal AI runner + FLEET_TOKEN the
  # content factory uses.
  spawn:
    needs: dispatch
    if: ${{ inputs.apply && needs.dispatch.outputs.plan != '' && needs.dispatch.outputs.plan != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        item: ${{ fromJSON(needs.dispatch.outputs.plan) }}
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # FLEET_TOKEN (bot PAT) so the leased agent can open its PR (and the PR
      # triggers CI). Falls back to github.token.
      GH_TOKEN: ${{ secrets.FLEET_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      # NOT continue-on-error: a crashed agent must show RED, not a silent skip.
      - name: Spawn ${{ matrix.item.role }} <- ${{ matrix.item.target }} (universal AI runner)
        uses: ./.github/actions/claude-run
        with:
          prompt: "You are the leased ${{ matrix.item.role }} agent for lifehacker.dev, working item ${{ matrix.item.target }}. Use the ${{ matrix.item.role }} skill to do EXACTLY ONE unit of work for that target. First run `gh pr list --state open --label auto:content --json title` and don't duplicate an open PR. Verify with /test-lifehacker. Then open ONE pull request (grow/fix roles) — or, for triage, file the deduped issue(s) — write the resulting PR/issue URL(s) to the file pr-result.txt, and STOP. Touch only what your role owns; never weaken a guardrail; never merge."
          tools: "Bash,Read,Write,Edit,Grep,Glob"
          system: "You are the ${{ matrix.item.role }} role on the lifehacker.dev fleet. Do one unit of work for ${{ matrix.item.target }}, open one PR (or file issues), record the URL in pr-result.txt, and stop. Never touch infra you don't own; never merge."
      - name: Confirm the agent produced something (fail visibly if not)
        run: |
          [ -s pr-result.txt ] || { echo "::error::fleet ${{ matrix.item.role }} ${{ matrix.item.target }}: produced no PR/issue — see the agent step log (auth? duplicate? build failure?)."; exit 1; }
          echo "result: $(cat pr-result.txt)"
