# =============================================================================
# triage.yml — reporting & triage (manual / on-demand)
# -----------------------------------------------------------------------------
# Runs the harness, ranks the findings into _data/health/queue.json, files
# deduplicated GitHub issues, regenerates the health dashboard, and opens a PR
# with the data changes. It NEVER merges and NEVER closes a human's issue.
# (The gated auto-merge sweep may ship the PR once green — see auto-merge.yml,
# which re-checks the diff is generated data only. Each run also closes the
# previous run's still-open triage PR as superseded: every run regenerates the
# full queue + dashboard, so stacked refreshes only rot into conflicts.)
#
# The daily schedule is the loop's reporting heartbeat (colophon, 2026-07-01):
# without it the ranked queue goes stale, the dispatcher's freshness fail-safe
# correctly dispatches NOTHING, and issues from nightly/deploy-verify dead-end.
# Scheduled runs are gated by the TRIAGE_ENABLED repo variable (unset = idle,
# same posture as every other autonomy loop) and run as apply=true — the var IS
# the consent. Manual workflow_dispatch runs keep the dry-run default. The bot
# PAT (FLEET_TOKEN) files UPSTREAM issues; GITHUB_TOKEN can only touch this
# repo, so upstream-routed items are reported and deferred, not force-filed.
# =============================================================================
name: triage

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Actually file issues (unchecked = dry-run plan only)"
        type: boolean
        default: false
      max_new:
        description: "Max new issues to file this run"
        type: string
        default: "10"
  schedule:
    - cron: '47 7 * * *'   # daily 07:47 UTC — after the nightly sweep settles

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: triage
  cancel-in-progress: false

jobs:
  # Kill switch for the SCHEDULED path: a cron run without TRIAGE_ENABLED=true
  # idles. Manual runs always go (a human clicked; `apply` still defaults off).
  gate:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.check.outputs.go }}
      apply: ${{ steps.check.outputs.apply }}
      max_new: ${{ steps.check.outputs.max_new }}
    steps:
      - id: check
        env:
          ENABLED: ${{ vars.TRIAGE_ENABLED }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            { echo "go=true"; echo "apply=${{ inputs.apply }}"; echo "max_new=${{ inputs.max_new }}"; } >> "$GITHUB_OUTPUT"
          elif [ "$ENABLED" = "true" ]; then
            { echo "go=true"; echo "apply=true"; echo "max_new=10"; } >> "$GITHUB_OUTPUT"
          else
            echo "scheduled triage is off (TRIAGE_ENABLED != true) — idle."
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

  triage:
    needs: gate
    if: ${{ needs.gate.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    env:
      # FLEET_TOKEN (bot PAT) so routed theme bugs can be filed UPSTREAM
      # (bamr87/zer0-mistakes) — the repo-scoped github.token can't write there.
      # Falls back to github.token for same-repo issues.
      GH_TOKEN: ${{ secrets.FLEET_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      # Build once (the harness needs _site for drift/link checks), then run the
      # checks against it to produce the findings contract — via the shared
      # composite, so the build+harness fail-safe is the SAME one the pipeline
      # uses (a broken build becomes a sev1 finding, not a dead triage job).
      # Non-gating here: the composite's harness step is continue-on-error, so a
      # harness failure still yields findings without killing the triage job.
      - name: Build + harness (findings contract)
        uses: ./.github/actions/build-and-harness

      - name: Ensure labels
        run: scripts/triage/bootstrap-labels.sh

      - name: Build queue + dashboard
        run: |
          ruby scripts/triage/build_queue.rb
          ruby scripts/triage/gen_dashboard.rb

      - name: File issues
        run: |
          if [ "${{ needs.gate.outputs.apply }}" = "true" ]; then
            ruby scripts/triage/file_issues.rb --apply --max-new "${{ needs.gate.outputs.max_new }}"
          else
            ruby scripts/triage/file_issues.rb --max-new "${{ needs.gate.outputs.max_new }}"
          fi

      # Feed the growth loop's exhaust back into its fuel tank: surface the
      # `## Backlog ideas` that merged content PRs left behind (read-only —
      # promotion into the backlog is a reviewed judgment, not a script).
      - name: Harvest backlog ideas from merged PRs
        continue-on-error: true
        run: |
          ruby scripts/triage/harvest_ideas.rb | tee harvest.out
          { echo "<!-- harvest-ideas -->"; cat harvest.out; } >> "$GITHUB_STEP_SUMMARY"

      - name: Open PR with queue + dashboard updates
        continue-on-error: true   # GITHUB_TOKEN-authored PRs are fine for data-only changes
        run: |
          git config user.name  "lifehacker-triage[bot]"
          git config user.email "triage@lifehacker.dev"
          branch="triage/$(date +%Y%m%d-%H%M)"
          git checkout -b "$branch"
          git add _data/health SITE_HEALTH.md _data/analytics 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No health changes to commit."
            exit 0
          fi
          git commit -m "triage: refresh queue + health dashboard"
          git push origin "$branch"
          gh pr create --base "${{ github.ref_name }}" --head "$branch" \
            --title "triage: queue + health dashboard refresh" \
            --body "Automated triage run. Updated \`_data/health/queue.json\` and \`SITE_HEALTH.md\`. Issues filed: see the run log. Generated data only — the gated auto-merge sweep ships it once the pipeline is green (anything beyond pure data gets \`needs-human\`). The triage bot itself never merges." \
            --label "source/triage-bot"

          # Supersede: every run regenerates the FULL queue + dashboard, so any
          # older still-open triage PR is stale by construction — and would go
          # conflicted the moment this one merges. Close them, newest wins.
          new=$(gh pr view "$branch" --json number --jq .number)
          for old in $(gh pr list --state open --label source/triage-bot \
                        --json number --jq ".[].number | select(. != $new)"); do
            gh pr comment "$old" --body "Superseded by #$new — every triage run regenerates the full queue + dashboard, so only the newest refresh matters." || true
            gh pr close "$old" --delete-branch || true
          done

      - name: Upload triage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: triage
          path: |
            _data/health/
            SITE_HEALTH.md
