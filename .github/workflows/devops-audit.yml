# =============================================================================
# devops-audit.yml — the DevOps manager on call
# -----------------------------------------------------------------------------
# Runs the deterministic CI/CD audit always, and (when an API key is present and
# you ask for it) the devops-manager AGENT to analyze throughput and open ONE PR
# with pipeline improvements. Manual on purpose — it can rewrite workflows, so it
# stays workflow_dispatch and never merges. The audit also runs on every PR
# inside pipeline.yml's fast tier; this workflow is the deeper, agent-driven pass.
# =============================================================================
name: devops-audit

on:
  workflow_dispatch:
    inputs:
      improve:
        description: "Run the devops-manager agent to propose improvements (needs ANTHROPIC_API_KEY)"
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: devops-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Deterministic audit (wiring + guardrails + throughput)
        run: ruby scripts/devops/audit.rb | tee audit.out

      - name: Contract simulation
        run: ruby scripts/sim/simulate.rb | tee sim.out

      - name: Summary
        if: always()
        run: |
          { echo "## DevOps audit"; echo '```'; cat audit.out; echo; tail -2 sim.out; echo '```'; } >> "$GITHUB_STEP_SUMMARY"

      - name: devops-manager agent (improve + open PR, universal AI runner)
        if: ${{ inputs.improve }}
        uses: ./.github/actions/claude-run
        continue-on-error: true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          prompt: "Use the devops-manager skill: audit the CI/CD, analyze throughput, apply safe improvements, verify with the harness + simulation, and open ONE PR. Never merge."
          tools: "Bash,Read,Edit,Write,Grep"
          system: "You are the devops-manager for lifehacker.dev. Improve the pipeline, verify, open one PR. Never merge or weaken a guardrail."
