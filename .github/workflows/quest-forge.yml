# =============================================================================
# quest-forge.yml — the post-retrospective hook: a build becomes an it-journey quest
# -----------------------------------------------------------------------------
# The last link in the retrospective chain. When a retrospective lands (a new entry
# in _data/retrospectives.yml on main), the quest-forge agent captures the merged-
# branch metadata of the build and files ONE proposal issue to bamr87/it-journey
# outlining a gamified epic quest — with every commit hash. See docs/RETROSPECTIVE-HOOK.md.
#
# Safe by default (same posture as theme-scout): gated by QUEST_FORGE_ENABLED + Claude
# auth. It only WRITES to it-journey (an issue), via a cross-repo token; it has
# contents:read here and never touches this repo. If it has no it-journey token it logs
# the quest instead of filing. NO administration/workflows scope.
# =============================================================================
name: quest-forge

on:
  push:
    branches: [main]
    paths: ['_data/retrospectives.yml']   # a retrospective just published
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quest-forge
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.check.outputs.go }}
    steps:
      - id: check
        env:
          ENABLED: ${{ vars.QUEST_FORGE_ENABLED }}
          OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "$ENABLED" = "true" ] && { [ -n "$OAUTH" ] || [ -n "$KEY" ]; }; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "quest-forge off (QUEST_FORGE_ENABLED != true or no Claude auth) — idle."
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

  forge:
    needs: gate
    if: ${{ needs.gate.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # A cross-repo PAT with issues:write on bamr87/it-journey. Falls back to
      # FLEET_TOKEN, then github.token (which CANNOT file cross-repo — the agent then
      # just logs the quest instead of filing).
      GH_TOKEN: ${{ secrets.IT_JOURNEY_TOKEN || secrets.FLEET_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0           # full history so collect_merged sees every merge
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Forge an it-journey quest from the merged-branch metadata (quest-forge)
        uses: ./.github/actions/claude-run
        continue-on-error: true
        with:
          agent: quest-forge
          prompt: "Use the quest-forge skill. Run `ruby scripts/retro/collect_merged.rb --markdown` to capture the merged-branch metadata (scope with --since the previous _data/retrospectives.yml entry's date, or all on the first run). Derive an it-journey.dev epic quest from it and file ONE proposal issue to bamr87/it-journey (labels: enhancement, automated) with the chapter plan, badges, a maintainer build plan, and the full ledger table — every PR number and commit hash quoted from collect_merged.rb, never invented. Cross-link commits as bamr87/lifehacker.dev@<sha>. If an open quest issue already covers this window, read it first (`gh issue view --repo bamr87/it-journey <n>`) and comment an update refined against its existing structure, instead of duplicating. If you cannot file cross-repo (no it-journey token), print the full issue body to the log. Read-only on this repo; never edit it; never merge; one issue."
          tools: "Bash(ruby:*),Bash(gh issue view:*),Bash(gh issue create:*),Bash(gh issue list:*),Bash(gh issue comment:*),Read,Grep,Glob"
          system: "You are quest-forge for lifehacker.dev. Capture merged-branch metadata and propose an it-journey quest as ONE issue. Read-only here; never invent a hash; never merge."
