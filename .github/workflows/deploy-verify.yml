# =============================================================================
# deploy-verify.yml — post-deploy live-site monitoring
# -----------------------------------------------------------------------------
# After a push to main, GitHub Pages rebuilds and deploys. This waits for the
# deploy, smoke-checks the live URLs, and — if the production site is broken —
# files ONE deduplicated sev1 issue. It is the "did the thing we shipped actually
# work in production" check the per-PR gate can't do. Read-only against the site;
# never deploys, never merges.
# =============================================================================
name: deploy-verify

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: deploy-verify
  cancel-in-progress: false

jobs:
  verify-live:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      BASE: https://lifehacker.dev
    steps:
      - uses: actions/checkout@v4

      - name: Wait for the Pages deploy to settle
        run: |
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 "$BASE/" || echo 000)
            echo "attempt $i: / -> $code"
            [ "$code" = "200" ] && exit 0
            sleep 30
          done
          echo "site did not return 200 within the window (continuing to the smoke check)"

      - name: Smoke-check live URLs
        id: smoke
        run: |
          set +e
          urls=("/" "/hacks/" "/tools/" "/blog/" "/about/" "/docs/" "/docs/health/" "/categories/" "/tags/" "/search/")
          fail=0
          {
            echo "## Live deploy verification"
            echo ""
            echo "Base: \`$BASE\` · $(date -u +%Y-%m-%dT%H:%MZ)"
            echo ""
            echo "| url | status |"
            echo "|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"
          # Retry each URL: GitHub Pages can lag, and the root may serve the OLD
          # deploy (200) while a newly added page is briefly 404. A transient
          # non-200 must not page a human, so retry before declaring failure.
          for u in "${urls[@]}"; do
            code=000
            for attempt in 1 2 3 4 5 6; do
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 "$BASE$u")
              [ "$code" = "200" ] && break
              sleep 15
            done
            mark="✅"; [ "$code" != "200" ] && { mark="❌"; fail=1; }
            echo "| \`$u\` | $code $mark |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "fail=$fail" >> "$GITHUB_OUTPUT"

      - name: File a sev1 issue if production is broken
        if: steps.smoke.outputs.fail == '1'
        continue-on-error: true   # a hiccup filing the alert must not fail the monitor itself
        run: |
          # Ensure the label taxonomy exists (idempotent) so the create can't fail
          # on a missing label before bootstrap-labels.sh has been run on the repo.
          scripts/triage/bootstrap-labels.sh >/dev/null 2>&1 || true
          marker="<!-- deploy-verify -->"
          existing=$(gh issue list --state open --search "\"$marker\" in:body" --json number --jq 'length')
          if [ "${existing:-0}" -ne 0 ]; then
            echo "deploy-verify issue already open; not refiling."
            exit 0
          fi
          # Labeled create first; fall back to a label-free create if the labels
          # still don't exist; if BOTH fail, make the dropped sev1 LOUD — a silent
          # drop here means production is down and nobody got paged.
          if gh issue create \
               --label "type/build-break,severity/sev1,source/ci-test,area/site" \
               --title "deploy-verify: production returned a non-200 after deploy" \
               --body "$marker"$'\nThe post-deploy smoke check found a non-200 on the live site (after retries). See the run Step Summary for the URL table. A human should look immediately; this is the kind of thing the fleet shifts all capacity to fix.' \
             || gh issue create \
               --title "deploy-verify: production returned a non-200 after deploy" \
               --body "$marker"$'\n(Labels unavailable — run scripts/triage/bootstrap-labels.sh.) Post-deploy smoke found a non-200; see the Step Summary.'; then
            echo "filed deploy-verify sev1 issue."
          else
            echo "::error::production is non-200 but BOTH issue-create attempts failed — the sev1 alert was DROPPED. Check GH_TOKEN issues:write and the GitHub API. Manual escalation required NOW."
            { echo ""; echo "> 🚨 **Alert delivery failed** — production returned non-200 *and* the sev1 issue could not be created (labeled or label-free). A human must escalate manually."; } >> "$GITHUB_STEP_SUMMARY"
          fi
