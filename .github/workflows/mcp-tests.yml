# =============================================================================
# mcp-tests.yml — gate the lifehacker-read MCP server on its own test suite.
# -----------------------------------------------------------------------------
# The Ruby `verify` pipeline lints the SITE; it does not run the Node MCP tests
# (mcp/ is excluded from the Jekyll build). This workflow closes that gap: on any
# change under mcp/lifehacker-read/** it typechecks, builds, and runs the 50-test
# suite + end-to-end smoke. Read-only (contents: read); takes no outward action,
# so it needs no autonomy gate. See mcp/lifehacker-read/EVIDENCE.md.
# =============================================================================
name: mcp-tests

on:
  pull_request:
    paths:
      - 'mcp/lifehacker-read/**'
      - '.github/workflows/mcp-tests.yml'
  push:
    branches: [main]
    paths:
      - 'mcp/lifehacker-read/**'
      - '.github/workflows/mcp-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mcp-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/lifehacker-read
    env:
      # The tests read the committed repo as their fixture (git is the database).
      LH_REPO_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20' # the package's supported floor (engines >=20)
          cache: npm
          cache-dependency-path: mcp/lifehacker-read/package-lock.json

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Typecheck (server + tests)
        run: npm run typecheck

      - name: Build (production)
        run: npm run build

      - name: Unit + integration suite
        run: npm test

      - name: Stdio end-to-end smoke
        run: npm run --silent smoke
