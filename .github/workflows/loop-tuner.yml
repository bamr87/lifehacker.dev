# =============================================================================
# loop-tuner.yml — the continuous-improvement hook for the autonomous loop
# -----------------------------------------------------------------------------
# Closes the feedback loop on the fleet ITSELF. The deterministic measure
# (`scripts/devops/loop_metrics.rb`) ALWAYS runs and prints a content-agnostic
# report of how the loop is performing — recent run durations + failure rates,
# content-PR time-to-merge, auto-fix attempt counts, escalation rate, recurring
# lint rules, and current conflicts — so the numbers show up in the run summary
# even with no API key. When LOOP_TUNER_ENABLED is on and Claude auth is present,
# the loop-tuner AGENT then reasons over those metrics, finds the upstream cause
# of the slowest / flakiest / most-escalated patterns, applies the smallest safe
# improvement anywhere in the loop (workflow, script, agent, or skill), and opens
# ONE PR. It is agnostic of any individual PR's content — it tunes the machine,
# not the posts.
#
# THE LOOP'S MEMORY (what makes runs compound instead of repeat): the measure
# step compares this window against the last committed snapshot in
# _data/metrics/history.jsonl (trend signals), and verify_improvements.rb checks
# every `pending` entry in _data/fleet/improvements.yml against its recorded
# baseline. The agent's FIRST job is settling those verdicts — then it appends
# this run's snapshot + any new ledger entries inside its ONE PR, so the next
# run starts from what this one learned. Memory reaches main only through the
# same human merge gate as everything else.
#
# The weekly cron is ON (colophon, 2026-07-01) but the same kill switch holds:
# a scheduled run without LOOP_TUNER_ENABLED=true + Claude auth only MEASURES
# (read-only report in the run summary) and opens nothing. Manual via
# workflow_dispatch; contents + pull-requests scope only, NO administration/
# workflows scope. It never merges and never weakens a guardrail.
# =============================================================================
name: loop-tuner

on:
  workflow_dispatch:
    inputs:
      improve:
        description: "Run the loop-tuner agent to propose improvements (needs LOOP_TUNER_ENABLED + Claude auth)"
        type: boolean
        default: true
  schedule:
    - cron: '23 6 * * 1'            # weekly, Mondays 06:23 UTC, after a week of runs

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: loop-tuner
  cancel-in-progress: false

jobs:
  measure:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.gate.outputs.go }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      # The math is a contract — prove it before trusting the report.
      - name: Metrics + memory self-tests
        run: |
          ruby scripts/devops/loop_metrics.rb --self-test
          ruby scripts/devops/verify_improvements.rb --self-test
          ruby scripts/triage/harvest_ideas.rb --self-test

      # Always-on, read-only measurement. Degrades gracefully if `gh` is slow.
      # --history compares against the last committed snapshot (trend signals);
      # --backlog surfaces starvation before the content factory improvises.
      - name: Measure the loop (content-agnostic, with memory)
        run: |
          ruby scripts/devops/loop_metrics.rb --out test-results/loop-metrics.json --markdown | tee loop.out
          { echo "<!-- loop-metrics -->"; cat loop.out; } >> "$GITHUB_STEP_SUMMARY"

      # Did the previous run's changes actually work? Read-only verdicts here;
      # the agent flips ledger statuses in its PR.
      - name: Verify the improvements ledger
        run: |
          ruby scripts/devops/verify_improvements.rb --metrics test-results/loop-metrics.json | tee ledger.out
          { echo "<!-- improvements-ledger -->"; cat ledger.out; } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: loop-metrics
          path: test-results/loop-metrics.json
          if-no-files-found: ignore

      - id: gate
        env:
          ENABLED: ${{ vars.LOOP_TUNER_ENABLED }}
          OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IMPROVE: ${{ inputs.improve }}
        run: |
          if [ "$ENABLED" = "true" ] && [ "$IMPROVE" != "false" ] && { [ -n "$OAUTH" ] || [ -n "$KEY" ]; }; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "loop-tuner agent off (LOOP_TUNER_ENABLED != true, improve unchecked, or no Claude auth) — measured only, no PR."
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

  improve:
    needs: measure
    if: ${{ needs.measure.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # FLEET_TOKEN (bot PAT) so the PR is openable + triggers CI; falls back.
      GH_TOKEN: ${{ secrets.FLEET_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.FLEET_TOKEN || github.token }}
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Tune the loop (loop-tuner, universal AI runner)
        uses: ./.github/actions/claude-run
        continue-on-error: true
        with:
          agent: loop-tuner
          prompt: "Use the loop-tuner skill. FIRST settle the loop's memory: run `ruby scripts/devops/loop_metrics.rb --json --out test-results/loop-metrics.json` then `ruby scripts/devops/verify_improvements.rb --metrics test-results/loop-metrics.json`, and flip each pending entry in _data/fleet/improvements.yml per the verdicts (a `regressed` entry is your TOP candidate to fix or revert). Then run the self-tests plus `audit.rb` + `simulate.rb` + `lint_agents.rb` for the baseline. Read the `signals` (including trend + backlog-starvation signals): for each strong one, find the UPSTREAM cause (a generator/skill defect that keeps emitting a lint rule, a slow/duplicate build, an un-enabled guardrail, a starved backlog kind) and make the SMALLEST content-agnostic change that moves the measured number — never a fix that only helps one PR. RECORD every change you make as a new `pending` entry in _data/fleet/improvements.yml (metric, baseline, direction, note) so the next run can verify it, and append this run's snapshot with `ruby scripts/devops/loop_metrics.rb --append-history >/dev/null`. Keep the metrics + audit + sim + lint_agents green, keep the required `verify` check stable, and open ONE PR (branch loop-tuner/<date>) that includes the ledger + history updates and whose body cites per change: metric before, root cause, fix, verification. If the window shows no real, evidenced improvement AND the ledger verdicts changed nothing, open NO PR and say the loop is healthy. Never weaken a guardrail; never merge."
          tools: "Bash(git:*),Bash(ruby:*),Bash(gh pr create:*),Bash(gh pr comment:*),Bash(gh run list:*),Bash(gh pr list:*),Bash(gh pr view:*),Read,Edit,Write,Grep,Glob"
          system: "You are loop-tuner for lifehacker.dev. Improve the autonomous loop from observed metrics, content-agnostic; least-privilege; never weaken a guardrail; never merge; one PR."
