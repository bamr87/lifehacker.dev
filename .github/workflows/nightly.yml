# =============================================================================
# nightly.yml — the non-gating, time-based sweeps
# -----------------------------------------------------------------------------
# These checks shouldn't block a PR: external link rot isn't the author's fault,
# and a fresh theme re-clone catches upstream zer0-mistakes drift that a cached
# build would hide. Runs on a schedule, files ONE coarse issue on failure (PR2
# will own real triage/dedup), and never touches main.
# =============================================================================
name: nightly

on:
  schedule:
    - cron: '17 7 * * *'   # 07:17 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      # Fresh theme clone (no cache) so upstream theme drift surfaces.
      - name: Build (fresh theme)
        id: build
        uses: ./.github/actions/build-overlay
        with:
          fresh-theme: 'true'

      # External link checking — rate-limited, non-gating.
      - name: External links
        id: external
        continue-on-error: true
        run: |
          bundle exec htmlproofer _site \
            --disable-internal --hydra '{"max_concurrency":2}' \
            --no-enforce-https --ignore-status-codes "429,503,0" \
            || echo "external link failures (non-gating)"

      # Run all hack commands in the sandbox (opt-out: everything except lh:norun).
      - name: Prime Directive (full sweep)
        id: prime
        continue-on-error: true
        env:
          LH_PRIME_MODE: optout
        run: |
          LH_SKIP_BUILD=1 ruby scripts/ci/run_hack_commands.rb
          ruby scripts/ci/aggregate.rb || true

      - name: File a nightly issue on failure
        if: ${{ failure() || steps.build.outcome == 'failure' }}
        continue-on-error: true   # a hiccup filing the alert must not be the last word; a DROP is made loud below
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Ensure the label taxonomy exists (idempotent) so the create can't fail
          # on a missing label before bootstrap-labels.sh has been run on the repo.
          scripts/triage/bootstrap-labels.sh >/dev/null 2>&1 || true
          title="nightly: build or sweep failed ($(date +%Y-%m-%d))"
          # Crude dedup until fingerprinted triage: skip if an open issue already
          # carries the nightly marker.
          existing=$(gh issue list --state open --search '"<!-- nightly-sweep -->" in:body' --json number --jq 'length')
          if [ "${existing:-0}" -ne 0 ]; then
            echo "nightly issue already open; not refiling."
            exit 0
          fi
          body=$'<!-- nightly-sweep -->\nThe nightly sweep failed. Most likely an upstream theme change broke the safe-mode build, or external links rotted. See the run logs. A human should triage.'
          # Try the labeled create; fall back to a label-free create if the labels
          # still don't exist; if BOTH fail, make the dropped alert loud (don't
          # let continue-on-error silently swallow a missed failure notification).
          if gh issue create --title "$title" --label "source/ci-test" --body "$body" \
             || gh issue create --title "$title" --body "$body"; then
            echo "filed nightly issue."
          else
            echo "::error::nightly sweep failed but BOTH issue-create attempts failed — the alert was DROPPED. Check GH_TOKEN issues:write."
            { echo ""; echo "> ⚠️ **Nightly alert delivery failed** — the sweep failed and the issue could not be created. Escalate manually."; } >> "$GITHUB_STEP_SUMMARY"
          fi
