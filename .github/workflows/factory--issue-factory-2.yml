name: "Factory: Issue Factory 2"
on:
  workflow_dispatch:
    inputs:
      apply:
        description: Apply changes (leave unchecked for a dry run — plan only)
        type: boolean
        default: false
  schedule:
    - cron: 0 7 * * 1-5
concurrency:
  group: factory--issue-factory-2-${{ github.event.issue.number || github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number || github.run_id }}
  cancel-in-progress: false
jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.check.outputs.go }}
    steps:
      - id: check
        env:
          ENABLED: ${{ vars.ISSUE_FACTORY_ENABLED }}
          OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |-
          if [ "$ENABLED" = "true" ] && { [ -n "$OAUTH" ] || [ -n "$KEY" ]; }; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "gate closed — set the 'ISSUE_FACTORY_ENABLED' variable to true and provision Claude auth to arm this line."
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi
  line:
    runs-on: ubuntu-latest
    needs: gate
    if: ${{ needs.gate.outputs.go == 'true' }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read
      id-token: write
    steps:
      - name: 🚥 rate.limiter (frl)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          LIMIT: "3"
        run: |-
          COUNT=$(gh run list --workflow "$GITHUB_WORKFLOW" --created "$(date -u +%Y-%m-%d)" --json databaseId --jq 'length')
          if [ "$COUNT" -gt "$LIMIT" ]; then echo "rate limit ($LIMIT/day) reached — stopping"; exit 1; fi
      - uses: actions/checkout@v4
      - name: ⚙ agent.claude (fa)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN == '' && secrets.ANTHROPIC_API_KEY || '' }}
          prompt: |-
            REPO: ${{ github.repository }}
            APPLY: ${{ (github.event_name != 'workflow_dispatch' || inputs.apply) }}

            Read and follow the operating instructions in .factory/prompts/issue-fixer.md.

            PLAN/APPLY MODE — when APPLY is false this is a DRY RUN: do the full analysis, then, instead of performing the write obligations below, report the exact plan of what you WOULD do and stop. Perform the obligations only when APPLY is true.

            OBLIGATIONS (complete every item, nothing else):
            1. [sink.open_pr fpr] Commit your changes on a new branch (`factory/issue-*`) and open a pull request with a clear summary. Never push to the default branch.
            2. [sink.comment fcm] Post exactly one comment on the relevant issue/PR (find it via gh) that links the fix PR on every member issue of the work order it addressed.
          claude_args: |-
            --model claude-opus-4-8
            --max-turns 40
            --allowedTools "Bash(gh issue list:*),Bash(gh search issues:*),Bash(gh issue view:*),Bash(gh pr list:*),Bash(gh pr view:*),Bash(gh pr diff:*),Read,Glob,Grep,Edit,Write,Bash(git switch:*),Bash(git checkout:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(gh pr create:*),Bash(gh issue comment:*),Bash(gh pr comment:*)"
