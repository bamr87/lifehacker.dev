# =============================================================================
# _data/brand/accepted.yml — the brand accept-ledger
# -----------------------------------------------------------------------------
# Reviewed `banned_when_sincere` hits (see _data/brand/glossary.yml) that are
# legitimately fine: a clearly flagged satire bit the tier-1 heuristic missed,
# or a plain literal sense of a hype word. Listing a hit here downgrades it from
# a blocking-adjacent `warning` to non-blocking `info`, so the PR test report
# and the weekly brand-sweep stop re-flagging prose a human (or the brand-fixer
# agent) already judged acceptable. It does NOT license the word everywhere —
# see "key" below.
#
# How to add one:
#   1. Run `LH_BRAND_SCOPE_ALL=1 ruby scripts/ci/lint_brand.rb` (or read the
#      `brand` rows in a PR's findings.jsonl). Each banned-word finding carries an
#      `accept_key`.
#   2. Copy that key here with the file, the word, a one-line `note` saying WHY the
#      use is fine, and the date you reviewed it.
#
# The matcher keys ONLY on `key`; file/word/note are for humans. The key is
# sha1(file | word | the trimmed line text)[0,12] — edit the line and the key
# changes, which re-opens the hit for review. That's deliberate: we accept a
# specific sentence, never blanket-license a word.
#
#   accepted:
#     - file: pages/_hacks/example.md
#       word: seamless
#       key:  ab12cd34ef56
#       note: scare-quoted "seamless" mocking the vendor's brochure — the bit, not a claim
#       reviewed: 2026-06-30
#
# 2026-07-15 recalibration (see /about/colophon/): the everyday hedge words
# (just, simply, obviously, powerful, unlock, leverage) left the banned list for
# glossary `watch_words` — writer guidance, not linted. Their 37 ledger entries
# were pruned here; keeping them would only have tripped the stale-orphan check
# on every full-repo scan. The four scare-quoted "10x" accepts below remain as
# reviewed human judgments, though the widened satire heuristic now catches
# scare quotes on its own.
# =============================================================================
accepted:
  # --- Work order #163: "10x" in scare quotes to dismiss the hype -----------
  # All four use "10x" inside double quotes to REJECT the buzzword, not to make
  # a sincere claim. The tier-1 regex flags the string; the meaning is anti-hype.
  - file: pages/_docs/the-word-police-that-cant-make-an-arrest.md
    word: 10x
    key:  1f8e607f4e78
    note: 'scare-quoted "10x" — the doc''s own line ("A site that satirizes 10x has to say 10x a lot"), meta-commentary, not a sincere claim'
    reviewed: 2026-07-06
  - file: pages/_hacks/tmux-conf-that-grows-up.md
    word: 10x
    key:  c9d5741c3648
    note: 'scare-quoted "10x" rejecting the hype ("It won''t 10x your terminal") — the opposite of a sincere claim'
    reviewed: 2026-07-06
  - file: pages/_hacks/tmux-survival-subset.md
    word: 10x
    key:  fb823000efd4
    note: 'scare-quoted "10x" rejecting the hype ("tmux will not 10x anything") — anti-hype, not sincere'
    reviewed: 2026-07-06
  - file: pages/_hacks/tmux-survive-a-reboot.md
    word: 10x
