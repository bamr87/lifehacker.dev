# =============================================================================
# scripts/news-enrichment.yml — drives scripts/migrate-to-news-structure.rb
# -----------------------------------------------------------------------------
# The deterministic knobs for the collections -> news-sections migration
# (issue #337). Adapted from year-of-ai's news migrator, which is driven by a
# per-section icon/description/featured config plus a per-item tag vocabulary.
#
# This file is the SINGLE source of taxonomy truth for the migration:
#   * `sections`       — one news section per former collection (identity + art)
#   * `tag_vocabulary` — the small, REUSED set of pills each section may show
#   * `tag_synonyms`   — how the old free-form tags collapse onto that vocab
#   * `default_tag`    — the fallback pill when nothing else matches
#
# The section layout turns a post's `tags` into the sub-topic filter pills, so
# the vocabulary is deliberately tiny (<=8 pills/section, no singletons). The
# migrator normalises every item's existing tags through `tag_synonyms`, keeps
# at most 3, and drops anything that would be a singleton pill.
# =============================================================================

sections:
  hacks:
    name: "Hacks"                     # the post `categories:[<name>]` value
    title: "Hacks"                    # section-page + nav title
    icon: "lightbulb"                 # bare (section layout renders `bi bi-<icon>`)
    nav_icon: "bi-lightbulb"          # prefixed (news/nav render `bi <nav_icon>`)
    description: "Real fixes for real problems — the dev kind and the life kind — with the failed attempts left in."
    section_style: "grid"
    old_url: "/hacks/"                # index page these items used to live under
    permalink_pattern: "/hacks/:slug/"
    featured: "git-worktree-two-branches-at-once"
    gradient: ["#d946ef", "#a855f7"]  # neon fuchsia -> violet (matches home cover)
  tools:
    name: "Tools"
    title: "Tools"
    icon: "wrench-adjustable"
    nav_icon: "bi-wrench-adjustable"
    description: "Honest reviews of software we actually ran. We name what we uninstalled and the free thing that beat it."
    section_style: "grid"
    old_url: "/tools/"
    permalink_pattern: "/tools/:slug/"
    featured: "ripgrep-honest-review"
    gradient: ["#22d3ee", "#6366f1"]  # neon cyan -> indigo
  field-notes:
    name: "Field Notes"
    title: "Field Notes"
    icon: "journal-text"
    nav_icon: "bi-journal-text"
    description: "The build log of a website that is automating its own author away — plus the occasional joke that survived review."
    section_style: "grid"
    old_url: "/blog/"
    # Field Notes keep their dated /posts/:y/:m/:d/:title/ permalink (Jekyll's
    # default posts pattern), so no explicit permalink_pattern here.
    featured: "concepts-context-content-i-hoard-the-one-that-rots"
    gradient: ["#22c55e", "#22d3ee"]  # neon green -> cyan

# The pill vocabulary each section is allowed to surface. Order is cosmetic;
# the section layout sorts pills alphabetically and shows the first 8.
tag_vocabulary:
  hacks:        [shell, git, ci-cd, jekyll, docker, security, web-dev, data]
  tools:        [search, files, data, system, editor, productivity]
  field-notes:  [automation, ai, jekyll, ci-cd, satire, business, engineering, career]

default_tag:
  hacks: shell
  tools: system
  field-notes: career

# Per-item pill overrides for the handful of items whose free-form tags can't be
# told apart by rule (e.g. every Rust CLI review carries `[cli, terminal,
# developer-tools]`, which says nothing about whether it views files or aids
# navigation). Keyed by <section>/<slug>. Wins over tag_synonyms mapping.
tag_overrides:
  tools:
    bat-honest-review: [files]
    eza-honest-review: [files]
    zoxide-honest-review: [productivity]

# old free-form tag (lower-cased) -> curated pill. Anything not listed is
