<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Lifehacker.dev icon">
  <!-- Favicon-optimized variant of logo.svg: same terminal-prompt mark, no glow
       filter (blurs at 16px) and heavier strokes so it stays legible tiny. -->
  <defs>
    <linearGradient id="lhf-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f17"/>
      <stop offset="1" stop-color="#171127"/>
    </linearGradient>
    <linearGradient id="lhf-neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d946ef"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="496" height="496" rx="112" fill="url(#lhf-bg)" stroke="url(#lhf-neon)" stroke-width="24"/>
  <g fill="none" stroke="url(#lhf-neon)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round">
    <!-- terminal prompt chevron -->
    <polyline points="140,172 232,256 140,340"/>
    <!-- cursor underscore -->
    <line x1="278" y1="340" x2="384" y2="340"/>
  </g>
</svg>
