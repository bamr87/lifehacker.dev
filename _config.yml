title:        "Lifehacker.dev"
description:  "Tips, tools, and experiments — rendered by the zer0-mistakes remote theme."
url:          "https://lifehacker.dev"
remote_theme: bamr87/zer0-mistakes
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-include-cache   # required: theme layouts use the {% include_cached %} tag
  - jekyll-relative-links
  - jekyll-redirect-from
  - jekyll-paginate
site_configured: false   # show the welcome wizard until you flip this to true

# This repo also hosts its own setup guide under docs/ (docs/README.md). That
# Markdown contains literal {% include_cached %} Liquid examples, so keep docs/
# out of the Jekyll build to stop it trying to execute them. (Setting exclude
# replaces Jekyll's default, so the usual build files are re-listed here.)
exclude:
  - docs
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
