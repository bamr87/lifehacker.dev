# =============================================================================
# lifehacker.dev — site configuration
# -----------------------------------------------------------------------------
# A Jekyll site rendered by the `bamr87/zer0-mistakes` remote theme and served
# by GitHub Pages at the apex domain lifehacker.dev.
#
# IMPORTANT (remote-theme rule): `remote_theme` only delivers the theme's
# _layouts/, _includes/, _sass/, and assets/. It does NOT deliver the theme's
# _config.yml, _data/, or _plugins/. So every structural block below
# (collections, defaults, appearance, nav wiring) is authored here on purpose,
# and the _data/ this site needs is committed in this repo. See docs/journey/.
# =============================================================================

# ── Setup flag ───────────────────────────────────────────────────────────────
# `false` shows the theme's onboarding wizard on the home page. We are
# configured, so this is true — the wizard is gone and our real site renders.
site_configured          : true

# ── Site identity ────────────────────────────────────────────────────────────
title                    : &title "Lifehacker.dev"
title_url                : "/"
title_icon               : "robot"
subtitle                 : "Surviving life, one byte at a time."
subtitle_icon            : "terminal"
title_separator          : "|"
description              : "Knowledge, tools, and comedy for getting through life one byte at a time."
locale                   : "en-US"
level                    : "n00b"

# ── Owner / founder ──────────────────────────────────────────────────────────
founder                  : "Amr Abdel-Motaleb"
name                     : &name "Amr"
email                    : "hello@lifehacker.dev"

# ── GitHub coordinates ───────────────────────────────────────────────────────
github_user              : &github_user "bamr87"
repository_name          : &repository_name "lifehacker.dev"
repository               : [*github_user, "/", *repository_name]
branch                   : "main"
remote_theme             : "bamr87/zer0-mistakes"

# ── URLs & deployment (custom apex domain) ───────────────────────────────────
url                      : "https://lifehacker.dev"
baseurl                  : ""
logo                     : /assets/images/logo.svg
logo_link                : "/"
og_image                 : /assets/images/og-banner.svg
teaser                   : /assets/images/og-banner.svg

# Favicon / browser identity — rendered by the theme's core/favicon.html.
# favicon.svg is the favicon-optimized cut of logo.svg (no glow, heavier
# strokes); favicon.ico (16/32/48) + apple-touch-icon.png are rasters of it.
favicon:
  ico                    : /favicon.ico
  svg                    : /assets/images/favicon.svg
  apple_touch            : /assets/images/apple-touch-icon.png
  theme_color            : "#0b0f17"   # address-bar chrome matches the site bg, not neon

# ── Read-time / chrome ───────────────────────────────────────────────────────
words_per_minute         : 200
breadcrumbs              : true
repo_map                 : "/sitemap/"

# ── Preview images (build-time tool, NOT a runtime plugin) ──────────────────
# Read by the zer0-image-generator gem (Gemfile) — the theme's ZER0-004
# engine, extracted upstream to bamr87/zer0-image-generator and consumed here
# as a gem instead of the old vendored scripts/lib/ copy. Run it as
# `bundle exec jekyll preview-images` or via the compatibility wrapper
# scripts/generate-preview-images.sh (same engine, full short-flag CLI). It
# runs on a laptop or in a workflow, writes PNGs/SVGs into
# assets/images/previews/, and stamps each article's `preview:` front matter.
# GitHub Pages never sees any of this — it only serves the committed images,
# which the remote theme's layouts already render (post cards, og:image,
# article banner). See /docs/the-plugin-that-isnt-a-plugin/.
#
# `local` renders a deterministic SVG banner offline — zero API keys, so any
# fleet agent can run it. Humans with keys can pass --provider openai (or xai/
# stability/gemini) for AI renders; Claude then analyzes the article into an
# art brief (prompt_engine) and vision-reviews the result (review_engine).
#
# WIRED INTO PUBLICATION: every new article is run through this generator before
# its PR opens (grow-lifehacker skill step 5; the content-factory + fleet-dispatch
# workflows), so it ships with cover art and a stamped `preview:` line. The
# front-matter lint warns (non-blocking) on any article still missing `preview:`.
preview_images:
  enabled                : true
  provider               : 'local'            # renderer: local (offline), openai, xai, stability, gemini
  model                  : ''                 # empty → the active renderer's default
  size                   : '1536x1024'        # landscape banner
  quality                : 'auto'
  style                  : 'neon-noir terminal art, late-night CRT glow, synthwave palette, clean vector shapes'
  style_modifiers        : 'fuchsia and cyan on near-black, scanlines, infomercial-after-dark energy'
  output_dir             : 'assets/images/previews'
  assets_prefix          : '/assets'          # prepended to relative preview: paths
  auto_prefix            : true
  prompt_engine          : 'claude'           # claude writes the art brief (template = built-in prompt)
  review_engine          : 'claude'           # claude vision-reviews the render (none = skip)
  collections:                                # pages/_<name> directories to scan
    - posts                                   # all news content (hacks/tools/field-notes) now lives here
    - docs
  # Per-collection visual identities (gem >= 0.3), keyed by Jekyll collection.
  # `docs` lives here because it IS its own collection. The news sections do
  # not: issue #337 folded hacks/tools/field-notes into one `posts` collection
  # under pages/_posts/<section>/, and the gem resolves a file's collection from
  # its nearest `_<name>` ancestor — so every section resolves to `posts` and a
  # `posts:` block here would flatten all three to one look. Section identity is
  # driven by `section_styles:` below instead; deliberately no `posts:` key.
  collection_styles:
    docs:                                     # reference guides
      style            : 'neon isometric technical diagram, clean labeled architecture, blueprint calm'
      style_modifiers  : 'thin cyan linework with fuchsia accents on near-black, matte panels, grid backdrop'
  # Per-SECTION visual identities for pages/_posts/<section>/ — distinct at a
  # glance: hacks = neon circuit schematic, tools = retro pixel game, field
  # notes = friendly robot office. Read by scripts/generate-preview-images.sh,
  # which exports them as IMAGE_STYLE / IMAGE_STYLE_MODIFIERS before invoking
  # the engine (the gem itself has no section-level hook — see the note above).
  # Because collection_styles has no `posts:` key, those env vars win.
  # Sections with no entry here fall back to the global style.
  section_styles:
    hacks:                                    # quick CLI tricks
      style            : 'neon circuit-board schematic, glowing terminal traces, exploded-diagram energy'
      style_modifiers  : 'cyan wireframes with fuchsia highlights on near-black, scanlines, monospace glyphs'
    tools:                                    # honest reviews
      style            : 'retro pixel art, 8-bit video game scene, chunky pixel sprites, arcade level energy'
      style_modifiers  : 'vibrant limited palette, CRT scanline glow, pixelated HUD elements, nostalgic game-box art'
    field-notes:                              # narrative essays
      style            : 'friendly cartoon illustration, cheerful robot protagonist living everyday office life'
      style_modifiers  : 'soft rounded shapes, warm inviting palette, playful slice-of-life humor, clean flat shading, cozy workplace props'

# ── Appearance: skin + palette + backgrounds ─────────────────────────────────
# Skins: air, aqua, dirt, neon, mint, plum, sunrise. `neon` gives lifehacker
# its late-night-terminal, infomercial-after-dark energy.
theme_skin               : "neon"

# Compile-time overrides of the --zer0-color-* tokens (tokens-inline.html).
# Hex codes MUST be quoted (unquoted #abc is parsed as a YAML comment → null).
theme_color:
  main:         "#d946ef"   # neon fuchsia (primary)
  secondary:    "#64748b"
  red:          "#ef4444"
  yellow:       "#facc15"
  teal:         "#22d3ee"
  blue:         "#22d3ee"   # links → neon cyan
  green:        "#22c55e"
  purple:       "#a855f7"
  pink:         "#ec4899"
  orange:       "#fb923c"
  cyan:         "#22d3ee"
  indigo:       "#6366f1"

# SVG background layers (gradient / pattern / noise per skin).
theme_background:
  enabled                : true
  gradient_opacity       : 0.6
  texture_opacity        : 0.04
  pattern_opacity        : 0.08
  blend_mode             : overlay

# Runtime light/dark/auto + primary-color picker in the Settings offcanvas.
appearance_panel         : true

# Page-load progress bar.
nanobar:
  enabled                : true
  color                  : "var(--bs-primary)"
  background             : "transparent"
  height                 : "3px"
  position               : "navbar"
  steps                  : [20, 55, 85, 100]
  step_delay_ms          : 120

# ── Analytics & comments — OFF until lifehacker.dev supplies its own ──────────
# (The theme's own _config ships these "on" with the author's keys; a remote
# consumer must NOT inherit those. We define them here, disabled, ready to wire.)
google_analytics         : null
posthog:
  enabled                : false
ai_chat:
  enabled                : false
# Giscus comments (the upstream `gisgus:` typo this note used to flag has been
# fixed — the theme reads `giscus:`). Flip `enabled` once a Giscus repo is connected.
giscus:
  enabled                : false

# Search-engine verification (add when you have them).
google_site_verification : null
bing_site_verification   : null

# ── Social / affiliations ────────────────────────────────────────────────────
default_icon: "bi"
links:
  - label: "GitHub"
    icon: "bi-github"
    url: "https://github.com/bamr87/lifehacker.dev"
  - label: "Theme"
    icon: "bi-palette"
    url: "https://github.com/bamr87/zer0-mistakes"
  - label: "IT-Journey"
    icon: "bi-signpost-split"
    url: "https://it-journey.dev"

# ── Author identity (for SEO + author cards) ─────────────────────────────────
author:
  name                   : *name
  avatar                 : "/assets/images/logo.svg"
  bio                    : "Builder of lifehacker.dev. Lets a robot do the typing."
  location               : "The Internet"
  github_username        : *github_user

# ── Build framework badge (footer "Powered by") ──────────────────────────────
powered_by:
  - name: "Jekyll"
    url: "https://jekyllrb.com/"
    icon: "bi-joystick"
  - name: "Bootstrap"
    version: "5.3"
    url: "https://getbootstrap.com/"
    icon: "bi-bootstrap"
  - name: "GitHub Pages"
    url: "https://pages.github.com/"
    icon: "bi-github"
  - name: "Claude Code"
    url: "https://claude.com/claude-code"
    icon: "bi-robot"

# ── Plugins (all on the GitHub Pages whitelist) ──────────────────────────────
# jekyll-include-cache is REQUIRED: the theme's layouts use {% include_cached %}
# and remote_theme does not enable plugins for you (this is the classic first
# build failure — see docs/journey/). jekyll-mermaid is intentionally absent:
# it is NOT whitelisted and the theme renders Mermaid client-side anyway.
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-include-cache
  - jekyll-relative-links
  - jekyll-redirect-from
  - jekyll-paginate

# In-content .md links inside collections must be rewritten or they 404.
# `collections: true` is the gotcha it-journey documents — keep it.
relative_links:
  enabled                : true
  collections            : true

# ── Markdown ─────────────────────────────────────────────────────────────────
markdown: kramdown
kramdown:
  input: GFM
  toc_levels: 1..6

# ── Sass ─────────────────────────────────────────────────────────────────────
sass:
  sass_dir: _sass
  style: compressed
  sourcemap: never

# ── Collections ──────────────────────────────────────────────────────────────
# Collections live under pages/ (so files are pages/_posts, pages/_docs, ...).
# The former `hacks` and `tools` collections were folded into `posts` as news
# sections under pages/_posts/<section>/ (issue #337); each item pins an explicit
# permalink to its old /hacks/:slug/ or /tools/:slug/ URL, so nothing 404s.
collections_dir: pages
collections:
  pages:
    output: true
    permalink: /:name/
  posts:
    output: true
    permalink: /posts/:year/:month/:day/:title/
  about:
    output: true
    permalink: /about/:name/
  docs:
    output: true
    permalink: /docs/:name/

permalink: pretty

# ── Pagination ───────────────────────────────────────────────────────────────
paginate: 10
paginate_path: "/posts/page/:num/"

# ── Front-matter defaults (the cascade the theme expects) ────────────────────
defaults:
  # Site-wide baseline.
  - scope:
      path: ""
    values:
      layout: default
      author: claude
      read_time: true
      share: true
      related: true
      comments: false
      sidebar:
        nav: auto
  # Top-level pages → main navbar sidebar.
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      sidebar:
        nav: main
  # News content — hacks, tools, and field notes all live under
  # pages/_posts/<section>/ now, so one posts default gives them all the
  # `article` layout and the Field-Notes sidebar. Section-specific chrome comes
  # from each post's `categories` (Hacks / Tools / Field Notes), not a scope.
  - scope:
      path: pages/_posts
    values:
      layout: article
      post_type: standard
      author_profile: true
      sidebar:
        nav: posts
  # About pages.
  - scope:
      path: pages/_about
    values:
      layout: default
      collection: about
      sidebar:
        nav: main
  # Docs.
  - scope:
      path: pages/_docs
    values:
      layout: default
      collection: docs
      sidebar:
        nav: auto

# ── Copyright ────────────────────────────────────────────────────────────────
cr_year: 2026
cr_entity: *title
cr_lisense: "MIT"

# ── Sitemap ──────────────────────────────────────────────────────────────────
sitemap_include: ["html", "xml"]

# ── Exclude from the build ───────────────────────────────────────────────────
# docs/ holds this repo's own setup tutorial + journey log, whose Markdown
# contains literal {% include_cached %} examples; keep it out of the build so
# Jekyll doesn't try to execute them. (Setting exclude replaces Jekyll's
# default list, so the usual build files are re-listed here.)
exclude:
  - docs
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - .jekyll-cache
  - _config_dev.yml
  - docker-compose.yml
  - docker
  - README.md
  - AUTOPILOT.md
  - .claude
  - scripts
  - node_modules
  - mcp
